# ─────────────────────────────────────────────────
# HexHunterX — Default Configuration
# ─────────────────────────────────────────────────

general:
  threads: 50
  timeout: 10
  max_retries: 3
  rate_limit: 10
  user_agent: "HexHunterX/1.0 (Security Assessment)"
  verify_ssl: false

database:
  path: "HexHunterX.db"

recon:
  passive_sources:
    - crt_sh
    - hackertarget
  subdomain_wordlist: "data/wordlists/common_subdomains.txt"
  enable_bruteforce: true
  enable_permutations: true
  max_subdomains: 5000
  enable_wayback: true

scanning:
  top_ports: 35
  dir_wordlist: "data/wordlists/common_dirs.txt"
  extensions:
    - ""
    - ".php"
    - ".html"
    - ".js"
    - ".json"
    - ".txt"
    - ".xml"
    - ".asp"
    - ".aspx"
    - ".jsp"
  max_dir_results: 500
  fingerprint: true

fuzzing:
  param_wordlist: "data/wordlists/common_params.txt"
  max_depth: 3
  max_params_per_url: 200
  enable_api_fuzzing: true
  backup_extensions:
    - ".bak"
    - ".old"
    - ".orig"
    - ".save"
    - ".swp"

vulnerability:
  checks:
    - xss
    - sqli
    - ssti
    - ssrf
    - nosqli
    - csrf
    - cors
    - open_redirect
    - idor
    - misconfig
  max_urls_per_check: 20
  xss_payloads_per_param: 5
  sqli_payloads_per_param: 5
  verify_findings: true

reporting:
  format:
    - json
    - html
  output_dir: "reports/output"
  include_evidence: true
  include_reproduction: true

integrations:
  subfinder:
    enabled: true
    timeout: 120
  httpx:
    enabled: true
    threads: 50
  ffuf:
    enabled: true
    threads: 40
  nuclei:
    enabled: true
    severity: "low,medium,high,critical"
    rate_limit: 150
